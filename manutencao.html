<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manutenção - RomTech Controle</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f5f9;
}

.header{
    background:#1e3a8a;
    color:#fff;
    padding:18px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.header a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:20px;
}

.box{
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:12px;
}

input,select,textarea{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:14px;
}

textarea{
    height:90px;
    resize:none;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.btn-save{background:#2563eb;}
.btn-edit{background:#f59e0b;}
.btn-delete{background:#ef4444;}
.btn-print{background:#10b981;}

.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    min-width:1300px;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #e2e8f0;
    text-align:left;
    white-space:nowrap;
}

th{
    background:#1e293b;
    color:white;
}

.actions{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
}

@media(max-width:768px){
    .container{padding:12px;}
    button{width:100%;}
}
</style>
</head>
<body>

<div class="header">
    <h2>Manutenção</h2>
    <a href="dashboard.html">← Dashboard</a>
</div>

<div class="container">

    <div class="box">
        <div class="grid">
            <select id="lojaId" onchange="carregarComputadores()">
                <option value="">Selecione Loja</option>
            </select>

            <select id="pcId">
                <option value="">Selecione Computador</option>
            </select>

            <input id="tecnico" placeholder="Técnico responsável">

            <select id="tipoManutencao">
                <option>Preventiva</option>
                <option>Corretiva</option>
                <option>Formatação</option>
                <option>Troca de peça</option>
                <option>Limpeza</option>
                <option>Diagnóstico</option>
            </select>

            <select id="statusManutencao">
                <option>Pendente</option>
                <option>Em análise</option>
                <option>Aprovado</option>
                <option>Em andamento</option>
                <option>Concluído</option>
                <option>Não necessário</option>
            </select>
        </div>

        <br>

        <textarea id="servicoRealizado" placeholder="Descrição do serviço realizado"></textarea>

        <br><br>
        <button class="btn-save" onclick="salvarManutencao()">Salvar</button>
    </div>

    <div class="box table-container">
        <table>
            <thead>
                <tr>
                    <th>Loja</th>
                    <th>Computador</th>
                    <th>Técnico</th>
                    <th>Tipo</th>
                    <th>Status</th>
                    <th>Serviço</th>
                    <th>Usuário</th>
                    <th>Data</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaManutencao"></tbody>
        </table>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCOjMwl8DVQ73AVUa0H4eFBwQuAmLM_aKs",
    authDomain: "controlegeral-c90c1.firebaseapp.com",
    projectId: "controlegeral-c90c1"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let editId = null;

auth.onAuthStateChanged(async user=>{
    if(!user){
        location.href="index.html";
        return;
    }

    await validarPermissao("manutencao");
    carregarLojas();
    listarManutencoes();
});

async function validarPermissao(modulo){
    const user = auth.currentUser;

    const snap = await db.collection("usuarios")
        .where("email","==",user.email)
        .get();

    snap.forEach(doc=>{
        const dados = doc.data();

        if(!dados.permissoes?.[modulo]){
            alert("Sem permissão");
            location.href="dashboard.html";
        }
    });
}

async function carregarLojas(){
    const snap = await db.collection("lojas").get();

    snap.forEach(doc=>{
        const loja = doc.data();

        lojaId.innerHTML += `
        <option value="${doc.id}">
            ${loja.codigoLoja} - ${loja.nomeLoja}
        </option>`;
    });
}

async function carregarComputadores(){
    pcId.innerHTML = `<option value="">Selecione Computador</option>`;

    const snap = await db.collection("computadores")
        .where("lojaId","==",lojaId.value)
        .get();

    snap.forEach(doc=>{
        const pc = doc.data();

        pcId.innerHTML += `
        <option value="${doc.id}">
            ${pc.nomePC} - ${pc.patrimonio}
        </option>`;
    });
}

async function salvarManutencao(){
    const user = auth.currentUser;

    const dados = {
        lojaId: lojaId.value,
        pcId: pcId.value,
        tecnico: tecnico.value,
        tipoManutencao: tipoManutencao.value,
        statusManutencao: statusManutencao.value,
        servicoRealizado: servicoRealizado.value,
        usuario: user.email,
        dataAtualizacao: new Date().toLocaleString("pt-BR")
    };

    if(editId){
        await db.collection("manutencao").doc(editId).update(dados);
    }else{
        await db.collection("manutencao").add(dados);
    }

    location.reload();
}

async function listarManutencoes(){
    const snap = await db.collection("manutencao").get();
    listaManutencao.innerHTML = "";

    for(const doc of snap.docs){
        const m = doc.data();

        let nomeLoja = "-";
        let nomePC = "-";

        if(m.lojaId){
            const lojaDoc = await db.collection("lojas").doc(m.lojaId).get();
            if(lojaDoc.exists){
                const loja = lojaDoc.data();
                nomeLoja = `${loja.codigoLoja} - ${loja.nomeLoja}`;
            }
        }

        if(m.pcId){
            const pcDoc = await db.collection("computadores").doc(m.pcId).get();
            if(pcDoc.exists){
                const pc = pcDoc.data();
                nomePC = `${pc.nomePC} - ${pc.patrimonio}`;
            }
        }

        listaManutencao.innerHTML += `
        <tr>
            <td>${nomeLoja}</td>
            <td>${nomePC}</td>
            <td>${m.tecnico}</td>
            <td>${m.tipoManutencao}</td>
            <td>${m.statusManutencao}</td>
            <td>${m.servicoRealizado}</td>
            <td>${m.usuario}</td>
            <td>${m.dataAtualizacao}</td>
            <td class="actions">
                <button class="btn-edit" onclick="editar('${doc.id}')">Editar</button>
                <button class="btn-print" onclick="imprimirOS('${doc.id}')">Imprimir</button>
                <button class="btn-delete" onclick="excluir('${doc.id}')">Excluir</button>
            </td>
        </tr>`;
    }
}

async function editar(id){
    const docSnap = await db.collection("manutencao").doc(id).get();
    const m = docSnap.data();

    lojaId.value = m.lojaId;
    await carregarComputadores();

    pcId.value = m.pcId;
    tecnico.value = m.tecnico;
    tipoManutencao.value = m.tipoManutencao;
    statusManutencao.value = m.statusManutencao;
    servicoRealizado.value = m.servicoRealizado;

    editId = id;
}

async function excluir(id){
    if(confirm("Excluir manutenção?")){
        await db.collection("manutencao").doc(id).delete();
        location.reload();
    }
}

async function imprimirOS(id){
    const docSnap = await db.collection("manutencao").doc(id).get();
    const dados = docSnap.data();

    let nomeLoja = "-";
    let nomePC = "-";

    if(dados.lojaId){
        const lojaDoc = await db.collection("lojas").doc(dados.lojaId).get();
        if(lojaDoc.exists){
            const loja = lojaDoc.data();
            nomeLoja = `${loja.codigoLoja} - ${loja.nomeLoja}`;
        }
    }

    if(dados.pcId){
        const pcDoc = await db.collection("computadores").doc(dados.pcId).get();
        if(pcDoc.exists){
            const pc = pcDoc.data();
            nomePC = `${pc.nomePC} - ${pc.patrimonio}`;
        }
    }

    const win = window.open("", "", "width=350,height=700");

    win.document.write(`
    <html>
    <head>
    <style>
        body{
            font-family:monospace;
            width:72mm;
            padding:5px;
            font-size:12px;
        }
        .linha{
            border-top:1px dashed #000;
            margin:8px 0;
        }
    </style>
    </head>
    <body>
        <h2 style="text-align:center;">ROMTECH CONTROLE</h2>
        <h3 style="text-align:center;">ORDEM DE SERVIÇO</h3>

        <div class="linha"></div>

        <p><b>Loja:</b> ${nomeLoja}</p>
        <p><b>Computador:</b> ${nomePC}</p>
        <p><b>Técnico:</b> ${dados.tecnico}</p>
        <p><b>Tipo:</b> ${dados.tipoManutencao}</p>
        <p><b>Status:</b> ${dados.statusManutencao}</p>

        <div class="linha"></div>

        <p><b>Serviço:</b><br>${dados.servicoRealizado}</p>

        <div class="linha"></div>

        <p><b>Usuário:</b> ${dados.usuario}</p>
        <p><b>Data:</b> ${dados.dataAtualizacao}</p>

        <br><br>
        <p>______________________</p>
        <p>Assinatura Técnico</p>

        <script>
            window.onload=function(){
                window.print();
                window.close();
            }
        <\/script>
    </body>
    </html>
    `);

    win.document.close();
}
</script>
</body>
</html>
