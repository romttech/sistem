<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manutenção - RomTech Controle</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{background:#f1f5f9;}

.header{
    background:#1e3a8a;
    color:white;
    padding:18px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.box{
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    margin-bottom:20px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:12px;
}

input,select,textarea{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
}

textarea{
    min-height:100px;
}

button{
    padding:12px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.btn-save{background:#2563eb;}
.btn-edit{background:#f59e0b;}
.btn-print{background:#10b981;}

.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    min-width:1100px;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #e2e8f0;
    text-align:left;
    white-space:nowrap;
}

th{
    background:#1e293b;
    color:white;
}

.actions{
    display:flex;
    gap:6px;
}

@media(max-width:768px){
    .header{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
    }

    button{
        width:100%;
    }
}
</style>
</head>
<body>

<div class="header">
    <h2>Manutenção</h2>
    <a href="dashboard.html">← Dashboard</a>
</div>

<div class="container">

<div class="box">
    <div class="form-grid">
        <select id="lojaId"></select>
        <select id="pcId"></select>
        <input id="tecnico" placeholder="Técnico responsável">

        <select id="tipoManutencao">
            <option>Preventiva</option>
            <option>Corretiva</option>
            <option>Upgrade</option>
            <option>Formatação</option>
            <option>Troca de peça</option>
        </select>

        <select id="statusManutencao">
            <option>Aberto</option>
            <option>Em análise</option>
            <option>Em andamento</option>
            <option>Aguardando peça</option>
            <option>Concluído</option>
        </select>
    </div>

    <br>

    <textarea id="servicoRealizado" placeholder="Defeito / serviço"></textarea>

    <br><br>
    <button class="btn-save" onclick="salvarManutencao()">Salvar</button>
</div>

<div class="box table-container">
    <table>
        <thead>
            <tr>
                <th>Loja</th>
                <th>PC</th>
                <th>Técnico</th>
                <th>Tipo</th>
                <th>Status</th>
                <th>Data</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="listaManutencao"></tbody>
    </table>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
 apiKey:"AIzaSyCOjMwl8DVQ73AVUa0H4eFBwQuAmLM_aKs",
 authDomain:"controlegeral-c90c1.firebaseapp.com",
 projectId:"controlegeral-c90c1"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let editId = null;

auth.onAuthStateChanged(async user=>{
    if(!user){
        location.href="index.html";
        return;
    }

    await validarPermissao("manutencao");
    carregarLojas();
    carregarPCs();
    listarManutencao();
});

async function validarPermissao(modulo){
    const user = auth.currentUser;

    const snap = await db.collection("usuarios")
        .where("email","==",user.email).get();

    snap.forEach(doc=>{
        if(!doc.data().permissoes?.[modulo]){
            alert("Sem permissão");
            location.href="dashboard.html";
        }
    });
}

async function carregarLojas(){
    lojaId.innerHTML = `<option value="">Selecione loja</option>`;

    const snap = await db.collection("lojas").get();

    snap.forEach(doc=>{
        const loja = doc.data();

        lojaId.innerHTML += `
        <option value="${doc.id}">
            ${loja.codigoLoja} - ${loja.nomeLoja}
        </option>`;
    });
}

async function carregarPCs(){
    pcId.innerHTML = `<option value="">Selecione computador</option>`;

    const snap = await db.collection("computadores").get();

    snap.forEach(doc=>{
        const pc = doc.data();

        pcId.innerHTML += `
        <option value="${doc.id}">
            ${pc.nomePC} - ${pc.patrimonio}
        </option>`;
    });
}

async function salvarManutencao(){
    const user = auth.currentUser;

    const dados = {
        lojaId: lojaId.value,
        pcId: pcId.value,
        tecnico: tecnico.value,
        tipoManutencao: tipoManutencao.value,
        statusManutencao: statusManutencao.value,
        servicoRealizado: servicoRealizado.value,
        usuario:user.email,
        dataAtualizacao:new Date().toLocaleString("pt-BR"),
        timestamp:new Date()
    };

    let manutencaoId;

    if(editId){
        await db.collection("manutencao").doc(editId).update(dados);
        manutencaoId = editId;
    }else{
        const ref = await db.collection("manutencao").add(dados);
        manutencaoId = ref.id;
    }

    await db.collection("historicoManutencao").add({
        manutencaoId,
        ...dados
    });

    location.reload();
}

async function listarManutencao(){
    const snap = await db.collection("manutencao").get();
    listaManutencao.innerHTML = "";

    for(const doc of snap.docs){
        const item = doc.data();

        let nomeLoja = "-";
        let nomePC = "-";

        if(item.lojaId){
            const lojaDoc = await db.collection("lojas").doc(item.lojaId).get();
            if(lojaDoc.exists){
                const loja = lojaDoc.data();
                nomeLoja = `${loja.codigoLoja} - ${loja.nomeLoja}`;
            }
        }

        if(item.pcId){
            const pcDoc = await db.collection("computadores").doc(item.pcId).get();
            if(pcDoc.exists){
                const pc = pcDoc.data();
                nomePC = `${pc.nomePC} - ${pc.patrimonio}`;
            }
        }

        listaManutencao.innerHTML += `
        <tr>
            <td>${nomeLoja}</td>
            <td>${nomePC}</td>
            <td>${item.tecnico}</td>
            <td>${item.tipoManutencao}</td>
            <td>${item.statusManutencao}</td>
            <td>${item.dataAtualizacao}</td>
            <td>
                <div class="actions">
                    <button class="btn-edit" onclick="editar('${doc.id}')">Editar</button>
                    <button class="btn-print" onclick="imprimirOS('${doc.id}')">Imprimir</button>
                </div>
            </td>
        </tr>`;
    }
}

async function editar(id){
    const docRef = await db.collection("manutencao").doc(id).get();
    const dados = docRef.data();

    lojaId.value = dados.lojaId;
    pcId.value = dados.pcId;
    tecnico.value = dados.tecnico;
    tipoManutencao.value = dados.tipoManutencao;
    statusManutencao.value = dados.statusManutencao;
    servicoRealizado.value = dados.servicoRealizado;

    editId = id;
}

async function imprimirOS(id){
    const docSnap = await db.collection("manutencao").doc(id).get();
    const dados = docSnap.data();

    let nomeLoja = "-";
    let nomePC = "-";

    if(dados.lojaId){
        const lojaDoc = await db.collection("lojas").doc(dados.lojaId).get();
        if(lojaDoc.exists){
            const loja = lojaDoc.data();
            nomeLoja = `${loja.codigoLoja} - ${loja.nomeLoja}`;
        }
    }

    if(dados.pcId){
        const pcDoc = await db.collection("computadores").doc(dados.pcId).get();
        if(pcDoc.exists){
            const pc = pcDoc.data();
            nomePC = `${pc.nomePC} - ${pc.patrimonio}`;
        }
    }

    const win = window.open("", "", "width=420,height=800");

    win.document.write(`
    <html>
    <head>
    <style>
    body{
        font-family:Arial;
        width:80mm;
        padding:8px;
        font-size:16px;
        line-height:1.4;
    }
    h1{text-align:center;font-size:22px;}
    h2{text-align:center;font-size:18px;}
    p{margin:8px 0;font-size:16px;}
    .linha{
        border-top:2px dashed #000;
        margin:12px 0;
    }
    </style>
    </head>
    <body>

    <h1>ROMTECH</h1>
    <h2>ORDEM DE SERVIÇO</h2>

    <div class="linha"></div>

    <p><strong>Loja:</strong> ${nomeLoja}</p>
    <p><strong>PC:</strong> ${nomePC}</p>
    <p><strong>Técnico:</strong> ${dados.tecnico}</p>
    <p><strong>Tipo:</strong> ${dados.tipoManutencao}</p>
    <p><strong>Status:</strong> ${dados.statusManutencao}</p>

    <div class="linha"></div>

    <p><strong>Serviço:</strong><br>${dados.servicoRealizado}</p>

    <div class="linha"></div>

    <p><strong>Usuário:</strong> ${dados.usuario}</p>
    <p><strong>Data:</strong> ${dados.dataAtualizacao}</p>

    <script>
    window.onload=function(){
        window.print();
        window.close();
    }
    <\/script>

    </body>
    </html>
    `);

    win.document.close();
}
</script>
</body>
</html>
