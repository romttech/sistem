<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Computadores - RomTech Controle</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f5f9;
}

.header{
    background:#1e3a8a;
    color:white;
    padding:20px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.header a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:30px;
}

.box{
    background:white;
    padding:25px;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    margin-bottom:25px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

input,select,textarea{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
}

textarea{
    height:80px;
    resize:none;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.btn-save{ background:#2563eb; }
.btn-delete{ background:#ef4444; }
.btn-edit{ background:#f59e0b; }
.btn-view{ background:#10b981; }

.table-container{
    overflow-x:auto;
    background:white;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

table{
    width:100%;
    min-width:1200px;
    border-collapse:collapse;
}

th,td{
    padding:14px;
    border-bottom:1px solid #e2e8f0;
    text-align:left;
    white-space:nowrap;
}

th{
    background:#1e293b;
    color:white;
}

.actions{
    display:flex;
    gap:8px;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    background:white;
    width:90%;
    max-width:700px;
    padding:25px;
    border-radius:16px;
    max-height:85vh;
    overflow:auto;
}

.close{
    float:right;
    cursor:pointer;
    font-size:22px;
    font-weight:bold;
}

@media(max-width:768px){
    .container{
        padding:15px;
    }
}
</style>
</head>
<body>

<div class="header">
    <h2>Computadores</h2>
    <a href="dashboard.html">← Dashboard</a>
</div>

<div class="container">

    <div class="box">
        <div class="form-grid">
            <input id="patrimonio" placeholder="Patrimônio">
            <input id="nomePC" placeholder="Nome do PC">
            <input id="processador" placeholder="Processador">
            <input id="ram" placeholder="RAM">
            <input id="armazenamento" placeholder="Armazenamento">
            <input id="sistema" placeholder="Sistema Operacional">
            <input id="serial" placeholder="Serial/Tag">

            <select id="lojaId"></select>
        </div>

        <br>
        <textarea id="observacoes" placeholder="Observações"></textarea>
        <br><br>

        <button class="btn-save" onclick="salvarComputador()">Salvar</button>
    </div>

    <div class="box">
        <select id="filtroLoja" onchange="listarComputadores()">
            <option value="">Todas as lojas</option>
        </select>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Patrimônio</th>
                    <th>Nome</th>
                    <th>Processador</th>
                    <th>RAM</th>
                    <th>Armazenamento</th>
                    <th>Loja</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaComputadores"></tbody>
        </table>
    </div>
</div>

<div class="modal" id="modalVisualizar">
    <div class="modal-content">
        <span class="close" onclick="fecharModal()">&times;</span>
        <h3>Informações do Computador</h3>
        <br>
        <div id="detalhesPC"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCOjMwl8DVQ73AVUa0H4eFBwQuAmLM_aKs",
  authDomain: "controlegeral-c90c1.firebaseapp.com",
  projectId: "controlegeral-c90c1"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
let editId = null;

window.onload = ()=>{
    carregarLojas();
    listarComputadores();
};

async function carregarLojas(){
    const snapshot = await db.collection("lojas").get();

    const select = document.getElementById("lojaId");
    const filtro = document.getElementById("filtroLoja");

    select.innerHTML = `<option value="">Selecione Loja</option>`;
    filtro.innerHTML = `<option value="">Todas as lojas</option>`;

    snapshot.forEach(doc=>{
        const loja = doc.data();

        select.innerHTML += `<option value="${doc.id}">${loja.nomeLoja}</option>`;
        filtro.innerHTML += `<option value="${doc.id}">${loja.nomeLoja}</option>`;
    });
}

async function salvarComputador(){
    const data = {
        patrimonio: patrimonio.value,
        nomePC: nomePC.value,
        processador: processador.value,
        ram: ram.value,
        armazenamento: armazenamento.value,
        sistema: sistema.value,
        serial: serial.value,
        lojaId: lojaId.value,
        observacoes: observacoes.value
    };

    if(editId){
        await db.collection("computadores").doc(editId).update(data);
        editId = null;
    }else{
        await db.collection("computadores").add(data);
    }

    location.reload();
}

async function listarComputadores(){
    const filtro = document.getElementById("filtroLoja").value;
    let query = db.collection("computadores");

    if(filtro){
        query = query.where("lojaId","==",filtro);
    }

    const snapshot = await query.get();
    const tbody = document.getElementById("listaComputadores");
    tbody.innerHTML = "";

    for(const doc of snapshot.docs){
        const pc = doc.data();

        let lojaNome = "-";

        if(pc.lojaId){
            const lojaDoc = await db.collection("lojas").doc(pc.lojaId).get();
            if(lojaDoc.exists) lojaNome = lojaDoc.data().nomeLoja;
        }

        tbody.innerHTML += `
        <tr>
            <td>${pc.patrimonio}</td>
            <td>${pc.nomePC}</td>
            <td>${pc.processador}</td>
            <td>${pc.ram}</td>
            <td>${pc.armazenamento}</td>
            <td>${lojaNome}</td>
            <td>
                <div class="actions">
                    <button class="btn-view" onclick="visualizar('${doc.id}')">Visualizar</button>
                    <button class="btn-edit" onclick="editar('${doc.id}')">Editar</button>
                    <button class="btn-delete" onclick="excluir('${doc.id}')">Excluir</button>
                </div>
            </td>
        </tr>`;
    }
}

async function visualizar(id){
    const pcDoc = await db.collection("computadores").doc(id).get();
    const pc = pcDoc.data();

    const upgrades = await db.collection("upgrades")
        .where("pcId","==",id)
        .get();

    let historico = "<h4>Histórico Upgrade</h4><br>";

    if(upgrades.empty){
        historico += "Nenhum upgrade registrado";
    }else{
        upgrades.forEach(doc=>{
            const up = doc.data();

            historico += `
                <p>
                Tipo: ${up.tipoUpgrade}<br>
                Status: ${up.statusUpgrade}<br>
                Atualizado por: ${up.atualizadoPor || '-'}<br>
                Última atualização: ${up.ultimaAtualizacao || '-'}
                </p><br>
            `;
        });
    }

    document.getElementById("detalhesPC").innerHTML = `
        <p><strong>Patrimônio:</strong> ${pc.patrimonio}</p>
        <p><strong>Nome:</strong> ${pc.nomePC}</p>
        <p><strong>Processador:</strong> ${pc.processador}</p>
        <p><strong>RAM:</strong> ${pc.ram}</p>
        <p><strong>Armazenamento:</strong> ${pc.armazenamento}</p>
        <p><strong>Sistema:</strong> ${pc.sistema}</p>
        <p><strong>Serial:</strong> ${pc.serial}</p>
        <p><strong>Observações:</strong> ${pc.observacoes}</p>
        <br>
        ${historico}
    `;

    document.getElementById("modalVisualizar").style.display = "flex";
}

function fecharModal(){
    document.getElementById("modalVisualizar").style.display = "none";
}

async function editar(id){
    const doc = await db.collection("computadores").doc(id).get();
    const pc = doc.data();

    patrimonio.value = pc.patrimonio;
    nomePC.value = pc.nomePC;
    processador.value = pc.processador;
    ram.value = pc.ram;
    armazenamento.value = pc.armazenamento;
    sistema.value = pc.sistema;
    serial.value = pc.serial;
    lojaId.value = pc.lojaId;
    observacoes.value = pc.observacoes;

    editId = id;
}

async function excluir(id){
    if(confirm("Excluir computador?")){
        await db.collection("computadores").doc(id).delete();
        location.reload();
    }
}
</script>
</body>
</html>
