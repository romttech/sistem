<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin - RomTech</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
}

header{
  background:#020617;
  padding:15px;
  text-align:center;
}

.container{
  max-width:900px;
  margin:30px auto;
}

.card{
  background:#020617;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

button{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.andamento{ background:orange; }
.finalizado{ background:green; color:white; }
.logout{ background:red; float:right; }

.login{
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.login-box{
  background:#020617;
  padding:30px;
  border-radius:10px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<div class="login" id="login">
  <div class="login-box">
    <h2>Admin</h2>
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="painel" style="display:none;">
  <header>
    Painel Admin
    <button class="logout" onclick="logout()">Sair</button>
  </header>

  <div class="container" id="lista"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDfQt664GIBA50jCfi7wYxUour3kmES424",
  authDomain: "siteromtech.firebaseapp.com",
  projectId: "siteromtech",
  storageBucket: "siteromtech.firebasestorage.app",
  messagingSenderId: "1035126772181",
  appId: "1:1035126772181:web:f595d7d98af6afc2a22d5c"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// 🔐 TROQUE PELO SEU EMAIL ADMIN
const ADMIN_EMAIL = "seuemail@empresa.com";

function login(){
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;

  auth.signInWithEmailAndPassword(email, senha)
    .catch(err=>alert(err.message));
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user=>{
  if(user){

    if(user.email !== ADMIN_EMAIL){
      alert("Acesso negado");
      auth.signOut();
      return;
    }

    document.getElementById("login").style.display="none";
    document.getElementById("painel").style.display="block";

    carregarChamados();

  } else {
    document.getElementById("login").style.display="flex";
    document.getElementById("painel").style.display="none";
  }
});

function carregarChamados(){
  db.collection("chamados")
    .orderBy("data","desc")
    .onSnapshot(snapshot=>{
      let html="";

      snapshot.forEach(doc=>{
        let c = doc.data();

        html += `
          <div class="card">
            <h3>${c.titulo}</h3>
            <p>${c.descricao}</p>
            <p>Status: ${c.status}</p>

            <button class="andamento" onclick="mudar('${doc.id}','andamento')">
              Andamento
            </button>

            <button class="finalizado" onclick="mudar('${doc.id}','finalizado')">
              Finalizar
            </button>
          </div>
        `;
      });

      document.getElementById("lista").innerHTML = html;
    });
}

function mudar(id, status){
  db.collection("chamados").doc(id).update({
    status: status
  });
}
</script>

</body>
</html>
