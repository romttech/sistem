<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lojas - RomTech Controle</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f5f9;
}

.header{
    background:#1e3a8a;
    color:white;
    padding:20px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.container{
    padding:30px;
}

.form-box{
    background:white;
    padding:25px;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    margin-bottom:25px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

input, select{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
}

button{
    margin-top:20px;
    padding:14px 20px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

th, td{
    padding:14px;
    text-align:left;
    border-bottom:1px solid #e2e8f0;
}

th{
    background:#1e293b;
    color:white;
}

.action-btn{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    margin-right:5px;
}

.delete{
    background:#ef4444;
}

.status{
    background:#16a34a;
}
</style>
</head>
<body>

<div class="header">
    <h2>Cadastro de Lojas</h2>
    <a href="dashboard.html">← Voltar Dashboard</a>
</div>

<div class="container">

    <div class="form-box">
        <div class="form-grid">
            <input type="text" id="nomeLoja" placeholder="Nome da Loja">
            <input type="text" id="codigoLoja" placeholder="Código da Loja">
            <input type="text" id="cidade" placeholder="Cidade">

            <select id="status">
                <option value="ativo">Ativo</option>
                <option value="inativo">Inativo</option>
            </select>
        </div>

        <button onclick="salvarLoja()">Cadastrar Loja</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Código</th>
                <th>Cidade</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="listaLojas"></tbody>
    </table>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCOjMwl8DVQ73AVUa0H4eFBwQuAmLM_aKs",
  authDomain: "controlegeral-c90c1.firebaseapp.com",
  projectId: "controlegeral-c90c1",
  storageBucket: "controlegeral-c90c1.firebasestorage.app",
  messagingSenderId: "530410393715",
  appId: "1:530410393715:web:c0c53cb80dc6d20fdeda06"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

listarLojas();

async function salvarLoja(){
    const data = {
        nomeLoja: document.getElementById("nomeLoja").value,
        codigoLoja: document.getElementById("codigoLoja").value,
        cidade: document.getElementById("cidade").value,
        status: document.getElementById("status").value,
        createdAt: new Date()
    };

    await db.collection("lojas").add(data);
    alert("Loja cadastrada com sucesso!");
    location.reload();
}

async function listarLojas(){
    const snapshot = await db.collection("lojas").get();
    const tbody = document.getElementById("listaLojas");
    tbody.innerHTML = "";

    snapshot.forEach(doc=>{
        const loja = doc.data();

        tbody.innerHTML += `
            <tr>
                <td>${loja.nomeLoja}</td>
                <td>${loja.codigoLoja}</td>
                <td>${loja.cidade}</td>
                <td>${loja.status}</td>
                <td>
                    <button class="action-btn status"
                        onclick="alterarStatus('${doc.id}','${loja.status}')">
                        Alterar Status
                    </button>

                    <button class="action-btn delete"
                        onclick="deletarLoja('${doc.id}')">
                        Excluir
                    </button>
                </td>
            </tr>
        `;
    });
}

async function alterarStatus(id,statusAtual){
    const novoStatus = statusAtual === "ativo" ? "inativo" : "ativo";

    await db.collection("lojas").doc(id).update({
        status: novoStatus
    });

    alert("Status atualizado!");
    location.reload();
}

async function deletarLoja(id){
    if(confirm("Deseja excluir esta loja?")){
        await db.collection("lojas").doc(id).delete();
        location.reload();
    }
}
</script>

</body>
</html>
