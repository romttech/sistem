<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lojas - RomTech Controle</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f5f9;
}

.header{
    background:#1e3a8a;
    color:white;
    padding:18px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}

.header a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.box{
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    margin-bottom:20px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:12px;
}

input,select{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:14px;
}

button{
    padding:12px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-weight:bold;
    font-size:14px;
}

.btn-save{background:#2563eb;}
.btn-edit{background:#f59e0b;}
.btn-delete{background:#ef4444;}
.btn-status{background:#10b981;}

.table-container{
    overflow-x:auto;
    width:100%;
}

table{
    width:100%;
    min-width:900px;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #e2e8f0;
    text-align:left;
    white-space:nowrap;
}

th{
    background:#1e293b;
    color:white;
}

.actions{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
}

@media(max-width:768px){
    .container{
        padding:12px;
    }

    .box{
        padding:15px;
    }

    .header{
        flex-direction:column;
        align-items:flex-start;
    }

    button{
        width:100%;
    }

    .actions button{
        width:auto;
        flex:1;
    }
}
</style>
</head>
<body>

<div class="header">
    <h2>Lojas</h2>
    <a href="dashboard.html">← Dashboard</a>
</div>

<div class="container">

    <div class="box">
        <div class="form-grid">
            <input id="nomeLoja" placeholder="Nome da Loja">
            <input id="codigoLoja" placeholder="Código Loja">
            <input id="cidade" placeholder="Cidade">

            <select id="statusLoja">
                <option value="ativo">Ativo</option>
                <option value="inativo">Inativo</option>
            </select>
        </div>

        <br>
        <button class="btn-save" onclick="salvarLoja()">Salvar</button>
    </div>

    <div class="box table-container">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Código</th>
                    <th>Cidade</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaLojas"></tbody>
        </table>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCOjMwl8DVQ73AVUa0H4eFBwQuAmLM_aKs",
    authDomain: "controlegeral-c90c1.firebaseapp.com",
    projectId: "controlegeral-c90c1"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let editId = null;

auth.onAuthStateChanged(async user=>{
    if(!user){
        location.href = "index.html";
        return;
    }

    await validarPermissao("lojas");
    listarLojas();
});

async function validarPermissao(modulo){
    const user = auth.currentUser;

    const snapshot = await db.collection("usuarios")
        .where("email","==",user.email)
        .get();

    snapshot.forEach(doc=>{
        const dados = doc.data();

        if(!dados.permissoes?.[modulo]){
            alert("Sem permissão");
            location.href = "dashboard.html";
        }
    });
}

async function salvarLoja(){
    const data = {
        nomeLoja: document.getElementById("nomeLoja").value.trim(),
        codigoLoja: document.getElementById("codigoLoja").value.trim(),
        cidade: document.getElementById("cidade").value.trim(),
        status: document.getElementById("statusLoja").value
    };

    if(!data.nomeLoja || !data.codigoLoja || !data.cidade){
        alert("Preencha todos os campos");
        return;
    }

    if(editId){
        await db.collection("lojas").doc(editId).update(data);
    }else{
        await db.collection("lojas").add(data);
    }

    location.reload();
}

async function listarLojas(){
    const snapshot = await db.collection("lojas").get();
    listaLojas.innerHTML = "";

    snapshot.forEach(doc=>{
        const loja = doc.data();

        listaLojas.innerHTML += `
        <tr>
            <td>${loja.nomeLoja || "-"}</td>
            <td>${loja.codigoLoja || "-"}</td>
            <td>${loja.cidade || "-"}</td>
            <td>${loja.status || "-"}</td>
            <td>
                <div class="actions">
                    <button class="btn-edit" onclick="editar('${doc.id}')">Editar</button>

                    <button class="btn-status"
                        onclick="alterarStatus('${doc.id}','${loja.status}')">
                        ${loja.status === 'ativo' ? 'Inativar' : 'Ativar'}
                    </button>

                    <button class="btn-delete" onclick="excluir('${doc.id}')">Excluir</button>
                </div>
            </td>
        </tr>`;
    });
}

async function editar(id){
    const docRef = await db.collection("lojas").doc(id).get();
    const loja = docRef.data();

    document.getElementById("nomeLoja").value = loja.nomeLoja || "";
    document.getElementById("codigoLoja").value = loja.codigoLoja || "";
    document.getElementById("cidade").value = loja.cidade || "";
    document.getElementById("statusLoja").value = loja.status || "ativo";

    editId = id;
}

async function alterarStatus(id,statusAtual){
    const novoStatus = statusAtual === "ativo" ? "inativo" : "ativo";

    await db.collection("lojas").doc(id).update({
        status: novoStatus
    });

    location.reload();
}

async function excluir(id){
    if(confirm("Excluir loja?")){
        await db.collection("lojas").doc(id).delete();
        location.reload();
    }
}
</script>
</body>
</html>
