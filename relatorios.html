<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatórios - RomTech Controle</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f5f9;
}

.header{
    background:#1e3a8a;
    color:white;
    padding:20px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
}

.header-actions{
    display:flex;
    gap:12px;
    align-items:center;
    flex-wrap:wrap;
}

.header a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.logout{
    background:#ef4444;
    border:none;
    color:white;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:30px;
}

.box{
    background:white;
    padding:25px;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

select,button{
    width:100%;
    padding:14px;
    border-radius:8px;
    border:1px solid #cbd5e1;
    margin-bottom:15px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="header">
    <h2>Relatórios PDF</h2>

    <div class="header-actions">
        <a href="dashboard.html">← Dashboard</a>
        <button class="logout" onclick="logout()">Sair</button>
    </div>
</div>

<div class="container">
    <div class="box">
        <h3>Gerar relatório por loja</h3>
        <br>

        <select id="lojaSelect">
            <option value="">Selecione uma loja</option>
        </select>

        <button onclick="gerarPDF()">Gerar PDF</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCOjMwl8DVQ73AVUa0H4eFBwQuAmLM_aKs",
  authDomain: "controlegeral-c90c1.firebaseapp.com",
  projectId: "controlegeral-c90c1",
  storageBucket: "controlegeral-c90c1.firebasestorage.app",
  messagingSenderId: "530410393715",
  appId: "1:530410393715:web:c0c53cb80dc6d20fdeda06"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(user=>{
    if(!user){
        window.location.href = "index.html";
    }else{
        carregarLojas();
    }
});

async function carregarLojas(){
    const snapshot = await db.collection("lojas").get();
    const select = document.getElementById("lojaSelect");

    snapshot.forEach(doc=>{
        const loja = doc.data();

        select.innerHTML += `
            <option value="${doc.id}">
                ${loja.codigoLoja} - ${loja.nomeLoja}
            </option>
        `;
    });
}

async function gerarPDF(){
    try{
        const lojaId = document.getElementById("lojaSelect").value;

        if(!lojaId){
            alert("Selecione uma loja.");
            return;
        }

        const lojaDoc = await db.collection("lojas").doc(lojaId).get();
        const loja = lojaDoc.data();

        const pcsSnapshot = await db.collection("computadores")
            .where("lojaId","==",lojaId)
            .get();

        const historicoSnapshot = await db.collection("historicoTrocas").get();

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();

        let y = 20;

        pdf.setFontSize(18);
        pdf.text("RomTech Controle - Relatório", 20, y);
        y += 15;

        pdf.setFontSize(12);
        pdf.text(`Loja: ${loja.nomeLoja}`, 20, y); y += 8;
        pdf.text(`Código: ${loja.codigoLoja}`, 20, y); y += 8;
        pdf.text(`Cidade: ${loja.cidade}`, 20, y); y += 8;
        pdf.text(`Total Equipamentos: ${pcsSnapshot.size}`, 20, y); y += 15;

        pdf.setFontSize(14);
        pdf.text("Equipamentos", 20, y);
        y += 10;

        pcsSnapshot.forEach(doc=>{
            const pc = doc.data();

            pdf.setFontSize(10);
            pdf.text(
                `${pc.patrimonio} - ${pc.nomePC} - ${pc.processador}`,
                20,
                y
            );
            y += 7;

            if(y > 270){
                pdf.addPage();
                y = 20;
            }
        });

        y += 10;

        pdf.setFontSize(14);
        pdf.text("Histórico / Alterações", 20, y);
        y += 10;

        for(const doc of historicoSnapshot.docs){
            const hist = doc.data();

            if(hist.pcId){
                const pcDoc = await db.collection("computadores")
                    .doc(hist.pcId)
                    .get();

                if(!pcDoc.exists) continue;

                const pc = pcDoc.data();

                if(pc.lojaId !== lojaId) continue;
            }

            pdf.setFontSize(10);

            const linha = `
${hist.dataTroca || "-"} | 
${hist.usuario || "-"} | 
${hist.statusNovo || hist.tipo || "Movimentação"}
            `.replace(/\s+/g, " ").trim();

            pdf.text(linha, 20, y);
            y += 7;

            if(y > 270){
                pdf.addPage();
                y = 20;
            }
        }

        pdf.save(`relatorio-${loja.nomeLoja}.pdf`);

    }catch(error){
        console.error(error);
        alert("Erro ao gerar relatório.");
    }
}

async function logout(){
    await auth.signOut();
    window.location.href = "index.html";
}
</script>

</body>
</html>
