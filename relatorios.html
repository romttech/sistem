<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatórios - RomTech Controle</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f5f9;
}

.header{
    background:#1e3a8a;
    color:white;
    padding:18px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}

.header a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.box{
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    margin-bottom:20px;
}

select,button{
    padding:12px;
    border-radius:8px;
    border:1px solid #cbd5e1;
    font-size:14px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    min-width:900px;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #e2e8f0;
    text-align:left;
    white-space:nowrap;
}

th{
    background:#1e293b;
    color:white;
}

@media(max-width:768px){
    .container{
        padding:12px;
    }

    .box{
        padding:15px;
    }

    button{
        width:100%;
        margin-top:10px;
    }
}
</style>
</head>
<body>

<div class="header">
    <h2>Relatórios</h2>
    <a href="dashboard.html">← Dashboard</a>
</div>

<div class="container">

    <div class="box">
        <select id="filtroLoja" onchange="gerarRelatorioTela()">
            <option value="">Selecione Loja</option>
        </select>

        <button onclick="exportarPDF()">Exportar PDF</button>
    </div>

    <div class="box table-container">
        <table>
            <thead>
                <tr>
                    <th>Patrimônio</th>
                    <th>Computador</th>
                    <th>Upgrade</th>
                    <th>Status</th>
                    <th>Última alteração</th>
                    <th>Usuário</th>
                </tr>
            </thead>
            <tbody id="relatorioBody"></tbody>
        </table>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCOjMwl8DVQ73AVUa0H4eFBwQuAmLM_aKs",
  authDomain: "controlegeral-c90c1.firebaseapp.com",
  projectId: "controlegeral-c90c1"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let dadosRelatorio = [];

auth.onAuthStateChanged(async user=>{
    if(!user){
        location.href = "index.html";
        return;
    }

    await validarPermissao("relatorios");
    carregarLojas();
});

async function validarPermissao(modulo){
    const user = auth.currentUser;

    const snapshot = await db.collection("usuarios")
        .where("email","==",user.email)
        .get();

    snapshot.forEach(doc=>{
        const dados = doc.data();

        if(!dados.permissoes?.[modulo]){
            alert("Sem permissão");
            location.href = "dashboard.html";
        }
    });
}

async function carregarLojas(){
    const snapshot = await db.collection("lojas").get();

    filtroLoja.innerHTML = `<option value="">Selecione Loja</option>`;

    snapshot.forEach(doc=>{
        const loja = doc.data();

        filtroLoja.innerHTML += `
            <option value="${doc.id}">
                ${loja.codigoLoja} - ${loja.nomeLoja}
            </option>
        `;
    });
}

async function gerarRelatorioTela(){
    const lojaId = filtroLoja.value;

    if(!lojaId) return;

    relatorioBody.innerHTML = "";
    dadosRelatorio = [];

    const pcs = await db.collection("computadores")
        .where("lojaId","==",lojaId)
        .get();

    for(const pcDoc of pcs.docs){
        const pc = pcDoc.data();

        const upgrades = await db.collection("upgrades")
            .where("pcId","==",pcDoc.id)
            .get();

        if(upgrades.empty){
            adicionarLinha({
                patrimonio: pc.patrimonio,
                nomePC: pc.nomePC,
                upgrade: "-",
                status: "-",
                data: "-",
                usuario: "-"
            });
        }

        upgrades.forEach(upDoc=>{
            const up = upDoc.data();

            adicionarLinha({
                patrimonio: pc.patrimonio,
                nomePC: pc.nomePC,
                upgrade: up.tipoUpgrade,
                status: up.statusUpgrade,
                data: up.ultimaAtualizacao || "-",
                usuario: up.atualizadoPor || "-"
            });
        });
    }
}

function adicionarLinha(item){
    dadosRelatorio.push(item);

    relatorioBody.innerHTML += `
        <tr>
            <td>${item.patrimonio}</td>
            <td>${item.nomePC}</td>
            <td>${item.upgrade}</td>
            <td>${item.status}</td>
            <td>${item.data}</td>
            <td>${item.usuario}</td>
        </tr>
    `;
}

function exportarPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(16);
    doc.text("Relatório RomTech Controle", 20, 20);

    let y = 35;

    dadosRelatorio.forEach(item=>{
        doc.setFontSize(10);

        doc.text(
            `${item.patrimonio} | ${item.nomePC} | ${item.upgrade} | ${item.status}`,
            10,
            y
        );

        y += 8;

        doc.text(
            `Atualização: ${item.data} | Usuário: ${item.usuario}`,
            10,
            y
        );

        y += 12;

        if(y > 270){
            doc.addPage();
            y = 20;
        }
    });

    doc.save("relatorio-romtech.pdf");
}
</script>

</body>
</html>
