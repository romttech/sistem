<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admins</title>

<style>
body{
    font-family:Arial;
    background:#f1f5f9;
    padding:30px;
}

.box{
    background:white;
    padding:25px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:12px;
}

input{
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    width:100%;
}

.permissions{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:20px;
}

button{
    padding:12px 20px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
}
</style>
</head>
<body>

<div class="box">
    <h2>Novo Admin</h2><br>

    <div class="grid">
        <input id="nome" placeholder="Nome">
        <input id="email" placeholder="Email">
    </div>

    <div class="permissions">
        <label><input type="checkbox" id="dashboard"> Dashboard</label>
        <label><input type="checkbox" id="computadores"> Computadores</label>
        <label><input type="checkbox" id="lojas"> Lojas</label>
        <label><input type="checkbox" id="upgrades"> Upgrades</label>
        <label><input type="checkbox" id="relatorios"> Relatórios</label>
        <label><input type="checkbox" id="admins"> Admins</label>
    </div>

    <br>
    <button onclick="salvarAdmin()">Salvar</button>
</div>

<div class="box">
    <h2>Admins cadastrados</h2><br>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Permissões</th>
            </tr>
        </thead>
        <tbody id="lista"></tbody>
    </table>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyCOjMwl8DVQ73AVUa0H4eFBwQuAmLM_aKs",
 authDomain: "controlegeral-c90c1.firebaseapp.com",
 projectId: "controlegeral-c90c1"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

auth.onAuthStateChanged(user=>{
    if(!user){
        location.href="index.html";
        return;
    }

    listarAdmins();
});

async function salvarAdmin(){
    await db.collection("usuarios").add({
        nome: nome.value,
        email: email.value,
        role:"admin",
        ativo:true,
        permissoes:{
            dashboard: dashboard.checked,
            computadores: computadores.checked,
            lojas: lojas.checked,
            upgrades: upgrades.checked,
            relatorios: relatorios.checked,
            admins: admins.checked
        }
    });

    alert("Admin salvo");
    location.reload();
}

async function listarAdmins(){
    const snapshot = await db.collection("usuarios").get();

    lista.innerHTML = "";

    snapshot.forEach(doc=>{
        const user = doc.data();

        lista.innerHTML += `
        <tr>
            <td>${user.nome}</td>
            <td>${user.email}</td>
            <td>
                ${Object.keys(user.permissoes || {})
                    .filter(k => user.permissoes[k])
                    .join(", ")}
            </td>
        </tr>
        `;
    });
}
</script>

</body>
</html>
