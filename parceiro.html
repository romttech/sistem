<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Parceiro - RomTech</title>

<style>
body{
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

.box{
  background:#020617;
  padding:30px;
  border-radius:10px;
  width:320px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:5px;
}

button{
  width:100%;
  padding:10px;
  background:#2563eb;
  border:none;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

.toggle{
  margin-top:10px;
  cursor:pointer;
  color:#60a5fa;
}
</style>
</head>

<body>

<div class="box">
  <h2 id="titulo">Acesso Parceiro</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">

  <button onclick="acao()" id="btn">Entrar</button>

  <div class="toggle" onclick="toggle()">Criar conta</div>
</div>

<!-- FIREBASE CORRETO -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDfQt664GIBA50jCfi7wYxUour3kmES424",
  authDomain: "siteromtech.firebaseapp.com",
  projectId: "siteromtech",
  storageBucket: "siteromtech.firebasestorage.app",
  messagingSenderId: "1035126772181",
  appId: "1:1035126772181:web:f595d7d98af6afc2a22d5c"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

let loginMode = true;

function toggle(){
  loginMode = !loginMode;

  document.getElementById("titulo").innerText =
    loginMode ? "Acesso Parceiro" : "Criar Conta";

  document.getElementById("btn").innerText =
    loginMode ? "Entrar" : "Cadastrar";
}

function acao(){
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;

  if(loginMode){
    auth.signInWithEmailAndPassword(email, senha)
      .then(()=>{
        window.location = "painel.html";
      })
      .catch(err=>alert(err.message));
  } else {
    auth.createUserWithEmailAndPassword(email, senha)
      .then(()=>alert("Conta criada com sucesso"))
      .catch(err=>alert(err.message));
  }
}
</script>

</body>
</html>
