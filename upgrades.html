<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upgrades - RomTech Controle</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f5f9;
}

.header{
    background:#1e3a8a;
    color:white;
    padding:20px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
}

.header-actions{
    display:flex;
    gap:15px;
    align-items:center;
    flex-wrap:wrap;
}

.header a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.logout{
    background:#ef4444;
    border:none;
    color:white;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.container{
    padding:30px;
    max-width:1400px;
    margin:auto;
}

.form-box{
    background:white;
    padding:25px;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    margin-bottom:25px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

select,input,textarea{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
}

textarea{
    resize:none;
    height:80px;
}

button{
    margin-top:20px;
    padding:14px 20px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.table-container{
    overflow-x:auto;
    background:white;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

table{
    width:100%;
    min-width:900px;
    border-collapse:collapse;
}

th, td{
    padding:14px;
    text-align:left;
    border-bottom:1px solid #e2e8f0;
    font-size:14px;
    white-space:nowrap;
}

th{
    background:#1e293b;
    color:white;
}

@media(max-width:768px){
    .container{
        padding:15px;
    }

    .header{
        flex-direction:column;
        align-items:flex-start;
    }

    .form-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<div class="header">
    <h2>Controle de Upgrades</h2>

    <div class="header-actions">
        <a href="dashboard.html">← Dashboard</a>
        <button class="logout" onclick="logout()">Sair</button>
    </div>
</div>

<div class="container">

    <div class="form-box">
        <div class="form-grid">

            <select id="pcSelect">
                <option value="">Selecione o Computador</option>
            </select>

            <select id="tipoUpgrade">
                <option value="RAM">RAM</option>
                <option value="SSD">SSD</option>
                <option value="Sistema Operacional">Sistema Operacional</option>
                <option value="Troca Completa">Troca Completa</option>
            </select>

            <select id="statusUpgrade">
                <option>Pendente</option>
                <option>Em análise</option>
                <option>Aprovado</option>
                <option>Em andamento</option>
                <option>Concluído</option>
                <option>Não necessário</option>
            </select>

            <input type="text" id="responsavel" placeholder="Responsável">

        </div>

        <br>
        <textarea id="observacaoUpgrade" placeholder="Observação"></textarea>

        <button onclick="salvarUpgrade()">Registrar Upgrade</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Computador</th>
                    <th>Tipo</th>
                    <th>Status</th>
                    <th>Responsável</th>
                    <th>Criado em</th>
                    <th>Atualizado por</th>
                    <th>Última atualização</th>
                </tr>
            </thead>
            <tbody id="listaUpgrades"></tbody>
        </table>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCOjMwl8DVQ73AVUa0H4eFBwQuAmLM_aKs",
  authDomain: "controlegeral-c90c1.firebaseapp.com",
  projectId: "controlegeral-c90c1",
  storageBucket: "controlegeral-c90c1.firebasestorage.app",
  messagingSenderId: "530410393715",
  appId: "1:530410393715:web:c0c53cb80dc6d20fdeda06"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(user=>{
    if(!user){
        window.location.href = "index.html";
    }else{
        carregarComputadores();
        listarUpgrades();
    }
});

async function carregarComputadores(){
    const snapshot = await db.collection("computadores").get();
    const select = document.getElementById("pcSelect");

    select.innerHTML = '<option value="">Selecione o Computador</option>';

    snapshot.forEach(doc=>{
        const pc = doc.data();

        select.innerHTML += `
            <option value="${doc.id}">
                ${pc.patrimonio} - ${pc.nomePC}
            </option>
        `;
    });
}

async function salvarUpgrade(){
    try{
        const user = auth.currentUser;

        await db.collection("upgrades").add({
            pcId: document.getElementById("pcSelect").value,
            tipoUpgrade: document.getElementById("tipoUpgrade").value,
            statusUpgrade: document.getElementById("statusUpgrade").value,
            responsavel: document.getElementById("responsavel").value,
            observacao: document.getElementById("observacaoUpgrade").value,
            dataSolicitacao: new Date().toLocaleString(),
            atualizadoPor: user.email,
            ultimaAtualizacao: new Date().toLocaleString()
        });

        alert("Upgrade registrado com sucesso!");
        location.reload();

    }catch(error){
        console.error(error);
        alert("Erro ao registrar upgrade.");
    }
}

async function listarUpgrades(){
    const snapshot = await db.collection("upgrades").get();
    const tbody = document.getElementById("listaUpgrades");
    tbody.innerHTML = "";

    for(const doc of snapshot.docs){
        const upgrade = doc.data();
        let nomePC = "-";

        if(upgrade.pcId){
            const pcDoc = await db.collection("computadores")
                .doc(upgrade.pcId)
                .get();

            if(pcDoc.exists){
                const pc = pcDoc.data();
                nomePC = pc.patrimonio + " - " + pc.nomePC;
            }
        }

        tbody.innerHTML += `
            <tr>
                <td>${nomePC}</td>
                <td>${upgrade.tipoUpgrade}</td>
                <td>
                    <select onchange="alterarStatus('${doc.id}', this.value)">
                        <option ${upgrade.statusUpgrade === 'Pendente' ? 'selected' : ''}>Pendente</option>
                        <option ${upgrade.statusUpgrade === 'Em análise' ? 'selected' : ''}>Em análise</option>
                        <option ${upgrade.statusUpgrade === 'Aprovado' ? 'selected' : ''}>Aprovado</option>
                        <option ${upgrade.statusUpgrade === 'Em andamento' ? 'selected' : ''}>Em andamento</option>
                        <option ${upgrade.statusUpgrade === 'Concluído' ? 'selected' : ''}>Concluído</option>
                        <option ${upgrade.statusUpgrade === 'Não necessário' ? 'selected' : ''}>Não necessário</option>
                    </select>
                </td>
                <td>${upgrade.responsavel}</td>
                <td>${upgrade.dataSolicitacao}</td>
                <td>${upgrade.atualizadoPor || "-"}</td>
                <td>${upgrade.ultimaAtualizacao || "-"}</td>
            </tr>
        `;
    }
}

async function alterarStatus(id, novoStatus){
    try{
        const user = auth.currentUser;
        if(!user) return;

        const ref = db.collection("upgrades").doc(id);
        const upgradeDoc = await ref.get();

        if(!upgradeDoc.exists) return;

        const upgrade = upgradeDoc.data();

        await ref.update({
            statusUpgrade: novoStatus,
            atualizadoPor: user.email,
            ultimaAtualizacao: new Date().toLocaleString()
        });

        await db.collection("historicoTrocas").add({
            tipo: "Alteração Upgrade",
            upgradeId: id,
            pcId: upgrade.pcId || "",
            statusNovo: novoStatus,
            usuario: user.email,
            dataTroca: new Date().toLocaleString()
        });

        alert("Status atualizado com sucesso!");
        location.reload();

    }catch(error){
        console.error(error);
        alert("Erro ao atualizar status.");
    }
}

async function logout(){
    await auth.signOut();
    window.location.href = "index.html";
}
</script>

</body>
</html>
