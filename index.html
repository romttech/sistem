<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - RomTech Controle</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.login-box{
    background:white;
    width:100%;
    max-width:420px;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.logo{
    width:180px;
    display:block;
    margin:0 auto 25px auto;
    object-fit:contain;
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#1e293b;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    font-size:15px;
}

button{
    width:100%;
    padding:14px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

.erro{
    margin-top:15px;
    color:#ef4444;
    text-align:center;
    font-size:14px;
}

@media(max-width:480px){
    .login-box{
        padding:25px;
    }

    .logo{
        width:140px;
    }
}
</style>
</head>
<body>

<div class="login-box">

    <img
        src="https://raw.githubusercontent.com/romttech/sistem/refs/heads/main/logo%20rom.png"
        alt="RomTech Logo"
        class="logo"
    >

    <h2>RomTech Controle</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <div class="erro" id="erro"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCOjMwl8DVQ73AVUa0H4eFBwQuAmLM_aKs",
  authDomain: "controlegeral-c90c1.firebaseapp.com",
  projectId: "controlegeral-c90c1",
  storageBucket: "controlegeral-c90c1.firebasestorage.app",
  messagingSenderId: "530410393715",
  appId: "1:530410393715:web:c0c53cb80dc6d20fdeda06"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(user=>{
    if(user){
        window.location.href = "dashboard.html";
    }
});

async function login(){
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    const erro = document.getElementById("erro");

    erro.innerText = "";

    try{
        const cred = await auth.signInWithEmailAndPassword(email, senha);

        const snapshot = await db.collection("usuarios")
            .where("email","==",email)
            .get();

        if(snapshot.empty){
            await auth.signOut();
            erro.innerText = "Usuário sem permissão.";
            return;
        }

        let autorizado = false;

        snapshot.forEach(doc=>{
            const userData = doc.data();

            if(
                userData.role === "admin" &&
                userData.ativo === true
            ){
                autorizado = true;
            }
        });

        if(!autorizado){
            await auth.signOut();
            erro.innerText = "Acesso negado.";
            return;
        }

        window.location.href = "dashboard.html";

    }catch(error){
        console.error(error);
        erro.innerText = "Email ou senha inválidos.";
    }
}
</script>

</body>
</html>
