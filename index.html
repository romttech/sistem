<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RomTech Controle - Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:380px;
    padding:35px;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    color:#1e3a8a;
    font-size:28px;
}

.logo p{
    color:#64748b;
    font-size:14px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:6px;
    font-size:14px;
    color:#334155;
    font-weight:bold;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    outline:none;
    font-size:14px;
}

.input-group input:focus{
    border-color:#2563eb;
}

button{
    width:100%;
    padding:14px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

#error{
    color:red;
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

.footer{
    margin-top:20px;
    text-align:center;
    font-size:12px;
    color:#64748b;
}
</style>
</head>
<body>

<div class="container">
    <div class="logo">
        <h1>RomTech Controle</h1>
        <p>Painel Administrativo</p>
    </div>

    <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Digite seu email">
    </div>

    <div class="input-group">
        <label>Senha</label>
        <input type="password" id="password" placeholder="Digite sua senha">
    </div>

    <button onclick="login()">Entrar</button>

    <div id="error"></div>

    <div class="footer">
        © 2026 RomTech Controle
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCOjMwl8DVQ73AVUa0H4eFBwQuAmLM_aKs",
  authDomain: "controlegeral-c90c1.firebaseapp.com",
  projectId: "controlegeral-c90c1",
  storageBucket: "controlegeral-c90c1.firebasestorage.app",
  messagingSenderId: "530410393715",
  appId: "1:530410393715:web:c0c53cb80dc6d20fdeda06"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

async function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const error = document.getElementById("error");

    error.innerText = "";

    try{
        const userCredential = await auth.signInWithEmailAndPassword(email,password);
        const user = userCredential.user;

        const snapshot = await db.collection("usuarios")
            .where("email","==",user.email)
            .get();

        if(snapshot.empty){
            error.innerText = "Usuário sem permissão.";
            await auth.signOut();
            return;
        }

        const userData = snapshot.docs[0].data();

        if(userData.role !== "admin"){
            error.innerText = "Acesso negado.";
            await auth.signOut();
            return;
        }

        window.location.href = "dashboard.html";

    }catch(err){
        error.innerText = "Email ou senha inválidos.";
        console.error(err);
    }
}
</script>

</body>
</html>
