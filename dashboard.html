<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - RomTech Controle</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f5f9;
}

.header{
    background:#1e3a8a;
    color:white;
    padding:20px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h1{
    font-size:24px;
}

.logout{
    background:#ef4444;
    border:none;
    color:white;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.container{
    padding:30px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:25px;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h3{
    color:#64748b;
    font-size:15px;
    margin-bottom:10px;
}

.card p{
    font-size:28px;
    font-weight:bold;
    color:#1e293b;
}

.menu{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    margin-bottom:30px;
}

.menu a{
    text-decoration:none;
    background:#2563eb;
    color:white;
    padding:18px;
    text-align:center;
    border-radius:12px;
    font-weight:bold;
    transition:.3s;
}

.menu a:hover{
    background:#1d4ed8;
}

.chart-box{
    background:white;
    padding:25px;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}
</style>
</head>
<body>

<div class="header">
    <h1>RomTech Controle</h1>
    <button class="logout" onclick="logout()">Sair</button>
</div>

<div class="container">

    <div class="cards">
        <div class="card">
            <h3>Total de PCs</h3>
            <p id="totalPCs">0</p>
        </div>

        <div class="card">
            <h3>Upgrades Pendentes</h3>
            <p id="pendentes">0</p>
        </div>

        <div class="card">
            <h3>Upgrades Concluídos</h3>
            <p id="concluidos">0</p>
        </div>

        <div class="card">
            <h3>Total de Lojas</h3>
            <p id="totalLojas">0</p>
        </div>
    </div>

    <div class="menu">
        <a href="computadores.html">Computadores</a>
        <a href="lojas.html">Lojas</a>
        <a href="upgrades.html">Upgrades</a>
        <a href="relatorios.html">Relatórios</a>
    </div>

    <div class="chart-box">
        <canvas id="graficoStatus"></canvas>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCOjMwl8DVQ73AVUa0H4eFBwQuAmLM_aKs",
  authDomain: "controlegeral-c90c1.firebaseapp.com",
  projectId: "controlegeral-c90c1",
  storageBucket: "controlegeral-c90c1.firebasestorage.app",
  messagingSenderId: "530410393715",
  appId: "1:530410393715:web:c0c53cb80dc6d20fdeda06"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(user=>{
    if(!user){
        window.location.href="index.html";
    } else {
        carregarDashboard();
    }
});

async function carregarDashboard(){
    const pcs = await db.collection("computadores").get();
    document.getElementById("totalPCs").innerText = pcs.size;

    const lojas = await db.collection("lojas").get();
    document.getElementById("totalLojas").innerText = lojas.size;

    const upgrades = await db.collection("upgrades").get();

    let pendentes = 0;
    let concluidos = 0;

    upgrades.forEach(doc=>{
        const data = doc.data();

        if(data.statusUpgrade === "Pendente" || data.statusUpgrade === "Em análise" || data.statusUpgrade === "Em andamento"){
            pendentes++;
        }

        if(data.statusUpgrade === "Concluído"){
            concluidos++;
        }
    });

    document.getElementById("pendentes").innerText = pendentes;
    document.getElementById("concluidos").innerText = concluidos;

    gerarGrafico(pendentes,concluidos);
}

function gerarGrafico(pendentes,concluidos){
    new Chart(document.getElementById("graficoStatus"),{
        type:"doughnut",
        data:{
            labels:["Pendentes","Concluídos"],
            datasets:[{
                data:[pendentes,concluidos],
                backgroundColor:["#f59e0b","#22c55e"]
            }]
        }
    });
}

async function logout(){
    await auth.signOut();
    window.location.href="index.html";
}
</script>

</body>
</html>
