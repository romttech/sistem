<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - RomTech Controle</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f5f9;
}

.header{
    background:#1e3a8a;
    color:white;
    padding:20px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
}

.nav{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
}

.nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.logout{
    background:#ef4444;
    border:none;
    color:white;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:30px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:25px;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h3{
    font-size:16px;
    color:#64748b;
    margin-bottom:10px;
}

.card span{
    font-size:32px;
    font-weight:bold;
    color:#1e293b;
}

.chart-box{
    background:white;
    padding:25px;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

select{
    padding:12px;
    border-radius:8px;
    border:1px solid #cbd5e1;
    margin-bottom:20px;
    min-width:250px;
}

canvas{
    width:100% !important;
    max-height:420px;
}

@media(max-width:768px){
    .container{
        padding:15px;
    }

    .header{
        flex-direction:column;
        align-items:flex-start;
    }
}
</style>
</head>
<body>

<div class="header">
    <h2>RomTech Controle</h2>

    <div class="nav">
        <a href="lojas.html">Lojas</a>
        <a href="computadores.html">Computadores</a>
        <a href="upgrades.html">Upgrades</a>
        <a href="relatorios.html">Relatórios</a>
        <a href="admins.html">Admins</a>
        <button class="logout" onclick="logout()">Sair</button>
    </div>
</div>

<div class="container">

    <div class="cards">
        <div class="card">
            <h3>Total PCs</h3>
            <span id="totalPCs">0</span>
        </div>

        <div class="card">
            <h3>Total Lojas</h3>
            <span id="totalLojas">0</span>
        </div>

        <div class="card">
            <h3>Upgrades Pendentes</h3>
            <span id="pendentes">0</span>
        </div>

        <div class="card">
            <h3>Upgrades Concluídos</h3>
            <span id="concluidos">0</span>
        </div>
    </div>

    <div class="chart-box">
        <h3 style="margin-bottom:20px;">Status de Upgrades</h3>

        <select id="filtroLoja" onchange="filtrarPorLoja()">
            <option value="">Todas as lojas</option>
        </select>

        <canvas id="graficoStatus" height="100"></canvas>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCOjMwl8DVQ73AVUa0H4eFBwQuAmLM_aKs",
  authDomain: "controlegeral-c90c1.firebaseapp.com",
  projectId: "controlegeral-c90c1",
  storageBucket: "controlegeral-c90c1.firebasestorage.app",
  messagingSenderId: "530410393715",
  appId: "1:530410393715:web:c0c53cb80dc6d20fdeda06"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let chart;

auth.onAuthStateChanged(async user=>{
    if(!user){
        window.location.href = "index.html";
        return;
    }

    await carregarPermissoes();
    carregarLojasFiltro();
    carregarDashboard();
});

async function carregarPermissoes(){
    const user = auth.currentUser;

    const snapshot = await db.collection("usuarios")
        .where("email","==",user.email)
        .get();

    if(snapshot.empty){
        alert("Usuário sem cadastro");
        window.location.href = "index.html";
        return;
    }

    let permissoes = {};

    snapshot.forEach(doc=>{
        permissoes = doc.data().permissoes || {};
    });

    aplicarPermissoes(permissoes);
}

function aplicarPermissoes(permissoes){
    const links = {
        lojas:'a[href="lojas.html"]',
        computadores:'a[href="computadores.html"]',
        upgrades:'a[href="upgrades.html"]',
        relatorios:'a[href="relatorios.html"]',
        admins:'a[href="admins.html"]'
    };

    Object.keys(links).forEach(modulo=>{
        if(!permissoes[modulo]){
            const el = document.querySelector(links[modulo]);
            if(el) el.style.display = "none";
        }
    });
}

async function carregarLojasFiltro(){
    const snapshot = await db.collection("lojas").get();
    const select = document.getElementById("filtroLoja");

    snapshot.forEach(doc=>{
        const loja = doc.data();

        select.innerHTML += `
            <option value="${doc.id}">
                ${loja.codigoLoja} - ${loja.nomeLoja}
            </option>
        `;
    });
}

async function filtrarPorLoja(){
    carregarDashboard(document.getElementById("filtroLoja").value);
}

async function carregarDashboard(lojaId=""){
    let pcsQuery = db.collection("computadores");

    if(lojaId){
        pcsQuery = pcsQuery.where("lojaId","==",lojaId);
    }

    const pcs = await pcsQuery.get();
    totalPCs.innerText = pcs.size;

    const lojas = await db.collection("lojas").get();
    totalLojas.innerText = lojas.size;

    const upgrades = await db.collection("upgrades").get();

    let pendentes = 0;
    let concluidos = 0;

    for(const doc of upgrades.docs){
        const upgrade = doc.data();

        if(lojaId && upgrade.pcId){
            const pcDoc = await db.collection("computadores")
                .doc(upgrade.pcId)
                .get();

            if(!pcDoc.exists) continue;
            if(pcDoc.data().lojaId !== lojaId) continue;
        }

        if(
            upgrade.statusUpgrade === "Pendente" ||
            upgrade.statusUpgrade === "Em análise" ||
            upgrade.statusUpgrade === "Em andamento" ||
            upgrade.statusUpgrade === "Aprovado"
        ){
            pendentes++;
        }

        if(upgrade.statusUpgrade === "Concluído"){
            concluidos++;
        }
    }

    pendentesEl = document.getElementById("pendentes");
    concluidosEl = document.getElementById("concluidos");

    pendentesEl.innerText = pendentes;
    concluidosEl.innerText = concluidos;

    gerarGrafico(pendentes, concluidos);
}

function gerarGrafico(pendentes, concluidos){
    const ctx = document.getElementById("graficoStatus");

    if(chart) chart.destroy();

    chart = new Chart(ctx,{
        type:"bar",
        data:{
            labels:["Pendentes","Concluídos"],
            datasets:[{
                data:[pendentes, concluidos],
                backgroundColor:["#f59e0b","#22c55e"],
                borderRadius:8
            }]
        },
        options:{
            responsive:true,
            plugins:{
                legend:{display:false}
            },
            scales:{
                y:{beginAtZero:true}
            }
        }
    });
}

async function logout(){
    await auth.signOut();
    window.location.href = "index.html";
}
</script>

</body>
</html>
